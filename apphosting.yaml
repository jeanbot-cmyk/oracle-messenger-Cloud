# ==========================================================
# ORACLE MESSENGER — Configuration Firebase App Hosting
# ==========================================================
# Ce fichier remplace toute configuration précédente.
# Il force Firebase à ignorer le dossier "functions" pour 
# se concentrer uniquement sur votre application Next.js.
# ==========================================================

# 1. Configuration du build : On pointe vers votre dossier application
buildConfig:
  buildDir: "oracle-messenger-app"
  buildCommand: "npm run build"

# 2. Configuration d'exécution (Infrastructure Cloud Run)
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 80

# 3. Variables d'environnement publiques
env:
  - variable: NEXT_PUBLIC_PAYSTACK_CURRENCY
    value: "XOF"
