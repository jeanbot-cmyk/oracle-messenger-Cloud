# ==========================================================
# ORACLE MESSENGER — Configuration Firebase App Hosting
# ==========================================================

# 1. Configuration du build : On pointe vers la racine
buildConfig:
  buildDir: "." 
  buildCommand: "npm run build"

# 2. Configuration d'exécution (Infrastructure Cloud Run)
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 80

# 3. Variables d'environnement publiques
env:
  - variable: NEXT_PUBLIC_PAYSTACK_CURRENCY
    value: "XOF"
